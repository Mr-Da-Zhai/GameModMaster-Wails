    <!-- Inter: real load (was only declared in CSS, never fetched).
         Weights chosen for the Apple-style type hierarchy: 300 Light for
         hero titles, 400 Regular for body, 500 Medium for emphasis,
         600 Semibold for buttons/labels. Preconnect + display=swap so
         text renders immediately with the fallback and swaps in. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    />
  </head>
